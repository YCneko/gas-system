openapi: "3.0.3"
info:
  title: Gas System — 多源废气智能治理系统 API
  description: |
    面向化工园区的多源废气智能治理系统后端 API 接口文档。

    **系统功能**：
    - 多源数据接入（CSV / Excel / JSON）
    - VOCs 浓度未来 6 小时预测与预警
    - 实时监测数据查询
    - 预警记录管理
    - 数据报告导出

    **技术栈**：Flask 3.1 + MySQL 8.0 + TensorFlow LSTM
  version: "3.2.0"
  contact:
    name: 深信软技信息技术有限公司
    email: contact@shenxin-tech.com
    url: https://www.shenxin-tech.com

servers:
  - url: http://localhost:5000
    description: 本地开发服务器
  - url: http://localhost:80/api
    description: Docker 部署（经 Nginx 反向代理）

tags:
  - name: 数据导入
    description: 历史数据文件上传与实时 JSON 数据接入
  - name: 预测与预警
    description: VOCs 浓度预测、超标预警
  - name: 实时监控
    description: 实时监测数据查询
  - name: 报告导出
    description: 历史数据报告导出
  - name: 预警记录
    description: 预警记录查询

paths:
  # ============================================================
  # 数据导入
  # ============================================================
  /api/data/upload:
    post:
      tags:
        - 数据导入
      summary: 上传 CSV 或 Excel 数据文件
      description: |
        上传历史数据文件（CSV / Excel），系统自动清洗、校验后入库。
        数据类型通过请求参数指定。

        **数据文件格式要求**：
        - emission: sensor_id, timestamp, voc_concentration, nox_concentration, so2_concentration
        - weather: station_id, timestamp, temperature, humidity, wind_speed, wind_direction
        - equipment: equipment_id, timestamp, operating_load, production_phase, status
      operationId: uploadDataFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - data_type
              properties:
                file:
                  type: string
                  format: binary
                  description: 数据文件（.csv / .xlsx / .xls）
                data_type:
                  type: string
                  enum:
                    - emission
                    - weather
                    - equipment
                  description: |
                    数据类型：
                    - `emission` — 废气排放数据
                    - `weather` — 气象数据
                    - `equipment` — 设备运行数据
      responses:
        "200":
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSuccess"
              example:
                message: "导入成功"
                imported_rows: 2160
                before_completeness: 85.3
                after_completeness: 97.8
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missing_file:
                  value:
                    error: "缺少文件"
                invalid_file:
                  value:
                    error: "无效文件，仅支持 .csv / .xlsx / .xls"
                invalid_type:
                  value:
                    error: "缺少或无效的 data_type，可选：emission, equipment, weather"
        "500":
          description: 服务器处理错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "处理失败: 字段 'voc_concentration' 不存在"

  /api/data/realtime:
    post:
      tags:
        - 数据导入
      summary: 接收 JSON 格式实时数据
      description: |
        接收传感器实时推送的 JSON 数据，支持批量写入。
        每条记录必须包含必填字段（sensor_id / equipment_id / station_id + timestamp）。
      operationId: postRealtimeData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealtimeRequest"
            examples:
              emission:
                value:
                  data_type: "emission"
                  records:
                    - sensor_id: "S001"
                      timestamp: "2026-06-03 14:30:00"
                      voc_concentration: 45.2
                      nox_concentration: 12.1
                      so2_concentration: 3.5
              weather:
                value:
                  data_type: "weather"
                  records:
                    - station_id: "W001"
                      timestamp: "2026-06-03 14:30:00"
                      temperature: 26.5
                      humidity: 68
                      wind_speed: 2.1
                      wind_direction: 180
      responses:
        "200":
          description: 数据接入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "实时数据接入成功"
                  processed_records:
                    type: integer
                    example: 5
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: 服务器处理错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # VOCs 预测与预警（完整版）
  # ============================================================
  /api/vocs/prediction:
    get:
      tags:
        - 预测与预警
      summary: 获取未来 6 小时 VOCs 预测及预警状态
      description: |
        调用 LSTM 模型（2层 LSTM + Dropout，124,902 参数）对 VOCs 浓度进行未来 6 小时逐小时预测，
        并基于 80 mg/m³ 阈值进行三级预警判定。

        **阈值标准**：VOCs ≤ 80 mg/m³（《大气污染物综合排放标准》GB 16297）。

        **预警等级**：
        - `高`：预测超标次数 > 3
        - `中`：预测超标次数 2~3
        - `低`：预测超标次数 = 1

        **性能**：单次预测 ~99ms，总响应 < 2 秒。
      operationId: getVocsPrediction
      responses:
        "200":
          description: 预测成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocsPredictionResponse"
              example:
                error: false
                predictions:
                  - hour: "+1h"
                    voc_concentration: 52.3
                  - hour: "+2h"
                    voc_concentration: 58.7
                  - hour: "+3h"
                    voc_concentration: 72.1
                  - hour: "+4h"
                    voc_concentration: 85.4
                  - hour: "+5h"
                    voc_concentration: 91.2
                  - hour: "+6h"
                    voc_concentration: 78.6
                prediction_elapsed_ms: 98.5
                alert:
                  triggered: true
                  level: "中"
                  exceed_count: 2
                  records:
                    - alert_timestamp: "2026-06-03 14:30:00"
                      predicted_exceedance_time: "2026-06-03 18:00:00"
                      predicted_value: 85.4
                      alert_level: "中"
                    - alert_timestamp: "2026-06-03 14:30:00"
                      predicted_exceedance_time: "2026-06-03 19:00:00"
                      predicted_value: 91.2
                      alert_level: "中"
                total_elapsed_ms: 105.3
        "400":
          description: 数据不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                message: "有效数据不足（当前 18 条，需要至少 30 条）"
        "500":
          description: 预测失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                message: "预测失败: 模型推理异常"
                prediction_elapsed_ms: 120.5
        "503":
          description: 模型文件缺失
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: true
                message: "模型文件缺失: vocs_lstm_model.keras。请先运行 train_model.py 训练模型。"

  # ============================================================
  # 前端兼容：预测图表数据
  # ============================================================
  /api/prediction:
    get:
      tags:
        - 预测与预警
      summary: 获取历史 + 预测数据（图表专用）
      description: |
        返回最近 24 个历史采样点 + 未来 6 小时预测点，
        供前端 PredictionChart 组件绘制趋势曲线。

        **注意**：此接口不触发预警检查。如需预警，请调用 `/api/vocs/prediction`。
      operationId: getPredictionChart
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionChartResponse"
              example:
                history:
                  - time: "06/03 08:00"
                    value: 42.5
                  - time: "06/03 09:00"
                    value: 45.1
                prediction:
                  - time: "06/03 15:00"
                    value: 52.3
                  - time: "06/03 16:00"
                    value: 58.7
        "500":
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # 实时数据
  # ============================================================
  /api/realtime:
    get:
      tags:
        - 实时监控
      summary: 获取最新实时监测数据
      description: |
        从数据库查询最新的排放和气象记录，
        返回 VOCs 浓度、温度、湿度、风速四项核心指标。
      operationId: getRealtimeData
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeResponse"
              example:
                voc: 45.2
                temp: 26.5
                humidity: 68
                wind: 2.1
        "500":
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # 预警列表
  # ============================================================
  /api/alerts:
    get:
      tags:
        - 预警记录
      summary: 获取预警记录列表
      description: |
        返回最近 50 条预警记录，按时间倒序排列。
        每条记录包含预警时间、指标名称、预警级别和详细信息。

        **预警级别映射**：
        - 数据库 `高` → 前端 `error`
        - 数据库 `中` → 前端 `warn`
        - 数据库 `低` → 前端 `info`
      operationId: getAlertList
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertItem"
              example:
                - id: 1
                  time: "06/03 14:30"
                  metric: "VOCs浓度"
                  level: "error"
                  detail: "预测超标时间: 06/03 18:00, 预测值: 91.2 mg/m³"
                - id: 2
                  time: "06/03 14:25"
                  metric: "VOCs浓度"
                  level: "warn"
                  detail: "预测超标时间: 06/03 17:00, 预测值: 75.8 mg/m³"
        "500":
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ============================================================
  # 报告导出
  # ============================================================
  /api/report/export:
    get:
      tags:
        - 报告导出
      summary: 导出历史排放数据为 CSV
      description: |
        导出最近 500 条废气排放历史记录为 CSV 文件。
        文件包含时间、VOCs浓度、NOx浓度、SO₂浓度四列。

        **响应格式**：`text/csv`，通过 `Content-Disposition` 附件下载。
      operationId: exportReport
      responses:
        "200":
          description: CSV 文件下载
          content:
            text/csv:
              schema:
                type: string
              example: |
                时间,VOCs浓度(mg/m³),NOx浓度(mg/m³),SO2浓度(mg/m³)
                2026-06-03 08:00:00,42.5,12.1,3.5
                2026-06-03 09:00:00,45.1,13.2,4.1
          headers:
            Content-Disposition:
              schema:
                type: string
              example: "attachment; filename=gas_report.csv"
        "500":
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ================================================================
# 组件定义
# ================================================================
components:
  schemas:
    # --- 通用错误 ---
    Error:
      type: object
      properties:
        error:
          type: string
          description: 错误描述信息
          example: "缺少文件"
        message:
          type: string
          description: 详细错误信息

    # --- 文件上传响应 ---
    UploadSuccess:
      type: object
      properties:
        message:
          type: string
          description: 操作结果描述
          example: "导入成功"
        imported_rows:
          type: integer
          description: 成功导入的记录数
          example: 2160
        before_completeness:
          type: number
          format: float
          description: 清洗前数据完整性（%）
          example: 85.3
        after_completeness:
          type: number
          format: float
          description: 清洗后数据完整性（%）
          example: 97.8

    # --- JSON 实时数据请求 ---
    RealtimeRequest:
      type: object
      required:
        - data_type
        - records
      properties:
        data_type:
          type: string
          enum:
            - emission
            - weather
            - equipment
          description: 数据类型
          example: "emission"
        records:
          type: array
          minItems: 1
          description: 数据记录列表
          items:
            type: object
            description: |
              通用字段说明：
              - **emission**：必填 `sensor_id`, `timestamp`
              - **weather**：必填 `station_id`, `timestamp`
              - **equipment**：必填 `equipment_id`, `timestamp`

    # --- VOCs 预测响应 ---
    VocsPredictionResponse:
      type: object
      properties:
        error:
          type: boolean
          description: 是否出错
          example: false
        predictions:
          type: array
          description: 未来 6 小时逐小时预测
          items:
            type: object
            properties:
              hour:
                type: string
                description: 相对时间标签
                example: "+1h"
              voc_concentration:
                type: number
                format: float
                description: 预测 VOCs 浓度 (mg/m³)
                example: 52.3
        prediction_elapsed_ms:
          type: number
          format: float
          description: 模型推理耗时（毫秒）
          example: 98.5
        alert:
          type: object
          description: 预警判定结果
          properties:
            triggered:
              type: boolean
              description: 是否触发预警
              example: true
            level:
              type: string
              enum:
                - "高"
                - "中"
                - "低"
              description: 预警等级
              example: "中"
            exceed_count:
              type: integer
              description: 预测超标小时数
              example: 2
            records:
              type: array
              description: 预警记录详情
              items:
                type: object
                properties:
                  alert_timestamp:
                    type: string
                    format: date-time
                  predicted_exceedance_time:
                    type: string
                    format: date-time
                  predicted_value:
                    type: number
                  alert_level:
                    type: string
        total_elapsed_ms:
          type: number
          format: float
          description: 接口总耗时（毫秒）
          example: 105.3

    # --- 图表数据响应 ---
    PredictionChartResponse:
      type: object
      properties:
        history:
          type: array
          description: 最近 24 个历史数据点
          items:
            type: object
            properties:
              time:
                type: string
                description: 时间标签（MM/DD HH:MM）
                example: "06/03 08:00"
              value:
                type: number
                description: VOCs 浓度 (mg/m³)
                example: 42.5
        prediction:
          type: array
          description: 未来 6 个预测数据点
          items:
            type: object
            properties:
              time:
                type: string
                example: "06/03 15:00"
              value:
                type: number
                example: 52.3

    # --- 实时监测响应 ---
    RealtimeResponse:
      type: object
      properties:
        voc:
          type: number
          format: float
          description: VOCs 浓度 (mg/m³)
          example: 45.2
        temp:
          type: number
          format: float
          description: 温度 (°C)
          example: 26.5
        humidity:
          type: number
          format: float
          description: 相对湿度 (%)
          example: 68
        wind:
          type: number
          format: float
          description: 风速 (m/s)
          example: 2.1

    # --- 预警项 ---
    AlertItem:
      type: object
      properties:
        id:
          type: integer
          description: 记录 ID
          example: 1
        time:
          type: string
          description: 预警触发时间
          example: "06/03 14:30"
        metric:
          type: string
          description: 监测指标
          example: "VOCs浓度"
        level:
          type: string
          enum:
            - error
            - warn
            - info
          description: |
            预警级别：
            - `error` — 高
            - `warn` — 中
            - `info` — 低
          example: "error"
        detail:
          type: string
          description: 预警详情
          example: "预测超标时间: 06/03 18:00, 预测值: 91.2 mg/m³"

# ================================================================
# 全局错误码说明
# ================================================================
# 200 — 请求成功
# 400 — 请求参数错误（缺少必填字段、文件格式不支持、数据类型无效）
# 500 — 服务器内部错误（数据库写入失败、特征构建失败）
# 503 — 服务不可用（模型文件缺失、依赖未就绪）
