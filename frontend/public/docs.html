<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas System — 项目文档</title>
<style>
:root {
  --bg: #0d1117;
  --sidebar-bg: #161b22;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #1f6feb33;
  --border: #30363d;
  --code-bg: #1c2128;
  --h1: #f0f6fc;
  --h2: #e6edf3;
  --table-stripe: #161b22;
  --link: #58a6ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
#sidebar { width:260px; min-width:260px; background:var(--sidebar-bg); border-right:1px solid var(--border); overflow-y:auto; padding:20px 0; display:flex; flex-direction:column; }
#sidebar .logo { padding:0 20px 20px; border-bottom:1px solid var(--border); margin-bottom:12px; }
#sidebar .logo h2 { font-size:16px; color:var(--h1); display:flex; align-items:center; gap:8px; }
#sidebar .logo h2 svg { width:24px; height:24px; }
#sidebar .logo p { font-size:12px; color:var(--text-dim); margin-top:4px; }
#sidebar nav { flex:1; overflow-y:auto; padding:0 8px; }
#sidebar .nav-section { margin-bottom:4px; }
#sidebar .nav-section > .nav-title { padding:8px 12px; font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
#sidebar .nav-section a { display:block; padding:6px 12px 6px 24px; font-size:13px; color:var(--text); text-decoration:none; border-radius:6px; transition:all 0.15s; }
#sidebar .nav-section a:hover { background:var(--accent-dim); color:var(--accent); }
#sidebar .nav-section a.active { background:var(--accent-dim); color:var(--accent); font-weight:500; }
#main { flex:1; overflow-y:auto; padding:40px 60px; max-width:900px; }
#main .doc-section { display:none; }
#main .doc-section.active { display:block; }
#main h1 { font-size:28px; color:var(--h1); margin:0 0 8px; font-weight:700; }
#main h2 { font-size:20px; color:var(--h1); margin:32px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); font-weight:600; }
#main h3 { font-size:16px; color:var(--h2); margin:24px 0 8px; font-weight:600; }
#main h4 { font-size:14px; color:var(--h2); margin:16px 0 6px; font-weight:600; }
#main p { font-size:14px; line-height:1.7; margin:8px 0; color:var(--text); }
#main ul, #main ol { margin:8px 0 8px 20px; }
#main li { font-size:14px; line-height:1.7; margin:2px 0; color:var(--text); }
#main strong { color:var(--h1); }
#main a { color:var(--link); text-decoration:none; }
#main a:hover { text-decoration:underline; }
#main table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
#main th { background:var(--code-bg); padding:8px 12px; text-align:left; font-weight:600; border:1px solid var(--border); color:var(--h1); }
#main td { padding:8px 12px; border:1px solid var(--border); }
#main tr:nth-child(even) td { background:var(--table-stripe); }
#main code { background:var(--code-bg); padding:2px 6px; border-radius:4px; font-size:13px; font-family:'SF Mono', 'Fira Code', monospace; color:#d2a8ff; }
#main pre { background:var(--code-bg); padding:16px; border-radius:8px; overflow-x:auto; margin:12px 0; border:1px solid var(--border); }
#main pre code { background:none; padding:0; color:#e6edf3; font-size:12px; line-height:1.6; display:block; }
#main hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
#main .check { color:#3fb950; }
#main .warn { color:#d29922; }
#mobile-nav { display:none; }
@media (max-width:768px) {
  body { flex-direction:column; }
  #sidebar { display:none; width:100%; min-width:0; max-height:40vh; }
  #sidebar.open { display:block; }
  #main { padding:20px; max-width:100%; }
  #mobile-nav { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--sidebar-bg); border-bottom:1px solid var(--border); }
  #mobile-nav button { background:var(--accent-dim); color:var(--accent); border:1px solid var(--border); padding:6px 16px; border-radius:6px; font-size:13px; cursor:pointer; }
}
</style>
</head>
<body>

<div id="mobile-nav">
  <strong style="color:var(--h1);font-size:14px;">Gas System 文档</strong>
  <button onclick="document.getElementById('sidebar').classList.toggle('open')">目录</button>
</div>

<aside id="sidebar" class="open">
  <div class="logo">
    <h2>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Gas System
    </h2>
    <p>多源废气智能治理系统</p>
  </div>
  <nav>
    <div class="nav-section">
      <div class="nav-title">项目概述</div>
      <a href="#doc0" class="active" onclick="switchDoc(0)">项目概要介绍</a>
    </div>
    <div class="nav-section">
      <div class="nav-title">技术文档</div>
      <a href="#doc1" onclick="switchDoc(1)">项目详细方案</a>
      <a href="#doc2" onclick="switchDoc(2)">数据接口设计文档</a>
      <a href="#doc3" onclick="switchDoc(3)">模型训练报告</a>
    </div>
    <div class="nav-section">
      <div class="nav-title">运维指南</div>
      <a href="#doc4" onclick="switchDoc(4)">系统使用手册</a>
    </div>
  </nav>
</aside>

<main id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const DOCS = [
  { title:'项目概要介绍', file:'docs/项目概要介绍.md' },
  { title:'项目详细方案', file:'docs/项目详细方案.md' },
  { title:'数据接口设计文档', file:'docs/数据接口设计文档.md' },
  { title:'模型训练报告', file:'docs/模型训练报告.md' },
  { title:'系统使用手册', file:'使用手册.md' },
];

let loaded = {};
let currentIdx = 0;

function switchDoc(idx) {
  currentIdx = idx;
  document.querySelectorAll('#sidebar a').forEach((a,i) => a.classList.toggle('active', i===idx));
  document.querySelectorAll('#main .doc-section').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('doc'+idx);
  if (target) target.classList.add('active');
  if (!loaded[idx]) loadDoc(idx);
  // Mobile: close sidebar
  document.getElementById('sidebar').classList.remove('open');
}

async function loadDoc(idx) {
  const doc = DOCS[idx];
  const main = document.getElementById('main');

  // Create section container
  let section = document.getElementById('doc'+idx);
  if (!section) {
    section = document.createElement('div');
    section.id = 'doc'+idx;
    section.className = 'doc-section' + (idx===currentIdx ? ' active' : '');
    section.innerHTML = '<p style="color:var(--text-dim)">加载中...</p>';
    main.appendChild(section);
  }

  try {
    const resp = await fetch(doc.file);
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const md = await resp.text();
    loaded[idx] = true;

    // Render markdown
    let html = marked.parse(md);

    // Post-process: add heading IDs, style tables, etc.
    section.innerHTML = html;
    if (idx === currentIdx) section.classList.add('active');

  } catch(e) {
    section.innerHTML = '<h1>'+doc.title+'</h1><p style="color:#f85149">文档加载失败: '+e.message+'</p><p style="color:var(--text-dim)">请确保通过 HTTP 服务器访问此页面（非 file:// 协议）</p>';
    loaded[idx] = false;
  }
}

// Init
(function init() {
  const main = document.getElementById('main');
  // Create all section containers
  DOCS.forEach((doc, i) => {
    const section = document.createElement('div');
    section.id = 'doc'+i;
    section.className = 'doc-section';
    section.innerHTML = '<p style="color:var(--text-dim)">加载中...</p>';
    main.appendChild(section);
  });
  // Load first doc
  switchDoc(0);
})();
</script>
</body>
</html>
